name: RERCie QA

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Check application and QA syntax
        run: |
          node --check app.js
          node --check planner.js
          node --check scripts/qa_public_site.cjs
      - name: Run release checks
        run: |
          python scripts/build_community_profiles.py --self-test
          python scripts/qa_release.py
      - name: Install browser QA dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run browser and mobile QA
        run: |
          python -m http.server 8877 --bind 127.0.0.1 > /tmp/rerc-http.log 2>&1 &
          node scripts/qa_public_site.cjs http://127.0.0.1:8877/ browser-qa
          python scripts/generate_source_qa_evidence.py --browser-report browser-qa/playwright_qa.json
          git diff --exit-code -- rercie/packaging/QA_EVIDENCE.json
          python scripts/qa_release.py
      - name: Upload browser QA evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-qa
          path: browser-qa/
          if-no-files-found: error