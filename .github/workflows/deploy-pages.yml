name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install browser QA dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run executable release QA
        run: python scripts/qa_release.py
      - name: Run browser and mobile QA
        run: |
          python -m http.server 8877 --bind 127.0.0.1 > /tmp/rerc-http.log 2>&1 &
          node scripts/qa_public_site.cjs http://127.0.0.1:8877/ browser-qa
      - name: Remove build-only dependencies
        run: |
          rm -rf node_modules browser-qa
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type f \( -name '*.pyc' -o -name '*.pyo' \) -delete
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
